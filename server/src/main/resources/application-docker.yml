server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:40}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:2000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:1000}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            # ✅ baseUrl이 Docker 내부 주소로 잡히는 문제 방지
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope: name, email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize?auth_type=reprompt  # ✅ 로그아웃 후 계정 선택 강제
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

ncp:
  object-storage:
    endpoint: ${NCP_OBJECT_STORAGE_ENDPOINT:https://kr.object.ncloudstorage.com}
    region: ${NCP_OBJECT_STORAGE_REGION:kr-standard}
    bucket: ${NCP_OBJECT_STORAGE_BUCKET:clovaspeech33}
    access-key: ${NCP_OBJECT_STORAGE_ACCESS_KEY:}
    secret-key: ${NCP_OBJECT_STORAGE_SECRET_KEY:}

clova:
  speech:
    domain-code: ${CLOVA_SPEECH_DOMAIN_CODE:CLOVA-SPEECH-33}
    invoke-url: ${CLOVA_SPEECH_INVOKE_URL:https://clovaspeech-gw.ncloud.com/recog/v1/stt}
    secret: ${CLOVA_SPEECH_SECRET:}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  mock-enabled: ${OPENAI_MOCK_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
  issuer: ${JWT_ISSUER:itpt}

cors:
  origins: ${CORS_ORIGINS:http://localhost:3000}

app:
  frontend-url: ${FRONTEND_URL}
  system-log:
    enabled: ${SYSTEM_LOG_ENABLED:true}
    auth-success-enabled: ${SYSTEM_LOG_AUTH_SUCCESS_ENABLED:false}
    noisy-event-sample-rate: ${SYSTEM_LOG_NOISY_EVENT_SAMPLE_RATE:0.1}
    executor:
      core-size: ${SYSTEM_LOG_EXECUTOR_CORE_SIZE:2}
      max-size: ${SYSTEM_LOG_EXECUTOR_MAX_SIZE:8}
      queue-capacity: ${SYSTEM_LOG_EXECUTOR_QUEUE_CAPACITY:1000}
